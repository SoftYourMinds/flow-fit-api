version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: flowfit-db
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: flowfit
      POSTGRES_PASSWORD: flowfit_dev_password
      POSTGRES_DB: flowfit_db
    volumes:
      - flowfit_pgdata:/var/lib/postgresql/data

volumes:
  flowfit_pgdata:
